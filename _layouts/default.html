<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.url != "/" %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    :root {
      --fg: #1f2328;
      --muted: #656d76;
      --link: #0969da;
      --border: #d0d7de;
      --bg-soft: #f6f8fa;
      --badge-bg: #ddf4ff;
      --badge-fg: #0969da;
    }
    * { box-sizing: border-box; }
    body {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.25rem 4rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.55;
      color: var(--fg);
      background: #fff;
    }
    nav.site-nav {
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    nav.site-nav a {
      color: var(--link);
      text-decoration: none;
      margin-right: 1rem;
    }
    nav.site-nav a:hover { text-decoration: underline; }
    h1, h2, h3, h4 { line-height: 1.25; margin-top: 2rem; }
    h1 { font-size: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.2rem; }
    a { color: var(--link); }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.92rem;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.7rem;
      text-align: left;
      vertical-align: top;
    }
    th { background: var(--bg-soft); font-weight: 600; }
    tr:nth-child(even) td { background: #fbfcfd; }
    code {
      background: var(--bg-soft);
      padding: 0.15em 0.35em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: var(--bg-soft);
      padding: 1rem;
      overflow-x: auto;
      border-radius: 6px;
      font-size: 0.88rem;
    }
    pre code { background: transparent; padding: 0; }
    pre.mermaid {
      background: #fff;
      text-align: center;
      border: 1px solid var(--border);
    }
    .badge {
      display: inline-block;
      padding: 0.1em 0.55em;
      font-size: 0.78em;
      font-weight: 600;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-fg);
      vertical-align: middle;
    }
    .stats {
      background: var(--bg-soft);
      border-left: 4px solid var(--link);
      padding: 0.75rem 1rem;
      margin: 1rem 0;
      font-size: 0.95rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin: 1rem 0;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.9rem 1rem;
      background: #fff;
    }
    .card h4 { margin: 0 0 0.4rem; font-size: 1rem; }
    .card .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.4rem; }
    .card .hook { font-size: 0.92rem; }
    footer {
      margin-top: 4rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/summaries/' | relative_url }}">All papers</a>
    {% if site.github.repository_url %}<a href="{{ site.github.repository_url }}">GitHub</a>{% endif %}
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    PREMAL · curated FHE + privacy-preserving ML literature map.
  </footer>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    // Kramdown renders ```mermaid as <pre><code class="language-mermaid">…</code></pre>.
    // Rewrite to <pre class="mermaid"> so mermaid.js picks it up.
    document.querySelectorAll('code.language-mermaid').forEach(el => {
      const pre = document.createElement('pre');
      pre.className = 'mermaid';
      pre.textContent = el.textContent;
      el.closest('pre').replaceWith(pre);
    });
    mermaid.initialize({ startOnLoad: true, theme: 'default', flowchart: { useMaxWidth: true } });
  </script>
</body>
</html>
